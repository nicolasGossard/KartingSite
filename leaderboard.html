<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><title>Leaderboard | Elite Racing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-wrapper"><nav><a href="index.html">Accueil</a><a href="team.html">Équipe</a><a href="leaderboard.html" class="active">Leaderboard</a></nav></div>
    
    <div class="theme-switch" id="theme-toggle"><div class="switch-dot" id="theme-icon">🌙</div></div>

    <section class="hero-title-centered" style="height: 60vh;">
        <h1 class="reveal active" style="font-size: 80px; font-weight: 800;">Classement.</h1>
    </section>

    <div style="max-width: 900px; margin: auto; padding: 0 20px 150px; display: flex; justify-content: center;">
        <div class="reveal active glass-card">
            <table>
                <thead style="background: rgba(255,255,255,0.02);"><tr style="font-size: 11px; color: var(--text-dim);"><th style="padding-left: 25px;">RANG</th><th>PILOTE</th><th style="text-align: right; padding-right: 40px;">CHRONO</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        function formatChrono(ms) {
            let mins = Math.floor(ms / 60000);
            let secs = Math.floor((ms % 60000) / 1000);
            let mms = ms % 1000;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}:${mms.toString().padStart(3, '0')}`;
        }

        async function loadLB() {
            try {
                const API_KEY = "dev_3c4618fd7ae34068a8891dd75abc4dd1";
                const auth = await fetch("https://api.lootlocker.io/game/v2/session/guest", {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({game_key: API_KEY, game_version: "0.1.0.0", development_mode: true})
                }).then(r => r.json());

                const lb = await fetch("https://api.lootlocker.io/game/leaderboards/33908/list?count=15", {
                    method: "GET", headers: {"x-session-token": auth.session_token}
                }).then(r => r.json());

                const body = document.getElementById('table-body');
                lb.items.forEach(item => {
                    let badgeClass = item.rank === 1 ? 'gold' : item.rank === 2 ? 'silver' : item.rank === 3 ? 'bronze' : 'other-rank';
                    body.innerHTML += `
                        <tr>
                            <td style="padding-left: 25px;"><div class="rank-badge ${badgeClass}">${item.rank}</div></td>
                            <td style="font-weight: 600; color: var(--text);">${item.player.name || "Inconnu"}</td>
                            <td style="text-align: right; padding-right: 40px; font-family: monospace; font-weight: 800; color: var(--accent); font-size: 20px;">${formatChrono(item.score)}</td>
                        </tr>`;
                });
            } catch(e) { console.error("Erreur API", e); }
        }
        loadLB();

        const toggle = document.getElementById('theme-toggle');
        const icon = document.getElementById('theme-icon');
        const applyTheme = (t) => {
            if(t === "light") { document.documentElement.setAttribute("data-theme", "light"); icon.innerText = "☀️"; }
            else { document.documentElement.removeAttribute("data-theme"); icon.innerText = "🌙"; }
        };
        toggle.onclick = () => {
            const t = document.documentElement.hasAttribute("data-theme") ? "dark" : "light";
            localStorage.setItem("theme", t); applyTheme(t);
        };
        applyTheme(localStorage.getItem("theme") || "dark");
    </script>
</body>
</html>
