<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Classement | Hall of Fame</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="nav-wrapper">
    <nav>
        <a href="index.html">Accueil</a>
        <a href="index.html#team">Équipe</a>
        <a href="leaderboard.html">Leaderboard</a>
    </nav>
</div>

<button id="theme-btn" class="theme-toggle">MODE CLAIR</button>

<div style="padding-top: 220px; max-width: 900px; margin: auto; padding-left: 20px; padding-right: 20px; padding-bottom: 120px;">
    
    <h1 class="reveal" style="font-size: clamp(40px, 8vw, 75px); text-align: center; margin-bottom: 20px; font-weight: 800;">
        Le Classement.
    </h1>
    
    <p class="reveal" style="text-align: center; color: var(--text-dim); font-size: 22px; margin-bottom: 80px;">
        Seuls les plus précis entrent dans l'histoire.
    </p>

    <div class="reveal glass-card">
        <table>
            <thead>
                <tr>
                    <th style="width: 100px;">RANG</th>
                    <th>PILOTE</th>
                    <th style="text-align: right;">TEMPS</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    const API_KEY = "dev_3c4618fd7ae34068a8891dd75abc4dd1"; 
    const LEADERBOARD_ID = "33908";

    function formatTime(ms) {
        let m = Math.floor(ms / 60000);
        let s = Math.floor((ms % 60000) / 1000);
        let mms = ms % 1000;
        return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}:${mms.toString().padStart(3,'0')}`;
    }

    async function load() {
        try {
            const auth = await fetch("https://api.lootlocker.io/game/v2/session/guest", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ game_key: API_KEY, game_version: "0.1.0.0", development_mode: true })
            }).then(r => r.json());

            const lb = await fetch(`https://api.lootlocker.io/game/leaderboards/${LEADERBOARD_ID}/list?count=15`, {
                method: "GET", headers: { "x-session-token": auth.session_token }
            }).then(r => r.json());

            const body = document.getElementById('table-body');
            lb.items.forEach(item => {
                let rc = item.rank === 1 ? 'gold' : item.rank === 2 ? 'silver' : item.rank === 3 ? 'bronze' : 'other';
                body.innerHTML += `
                    <tr>
                        <td><div class="rank-box ${rc}">${item.rank}</div></td>
                        <td style="font-weight: 600;">${item.player.name || item.player.public_uid || "Inconnu"}</td>
                        <td style="text-align: right; font-family: monospace; font-weight: 700; color: var(--accent); font-size: 19px;">${formatTime(item.score)}</td>
                    </tr>
                `;
            });
            gsap.to(".reveal", { opacity: 1, y: 0, duration: 1.2, ease: "power4.out", stagger: 0.15 });
        } catch (e) { console.error(e); }
    }

    const btn = document.getElementById("theme-btn");
    const applyTheme = (t) => {
        if(t==='light'){ document.documentElement.setAttribute("data-theme","light"); btn.innerText="MODE SOMBRE"; }
        else { document.documentElement.removeAttribute("data-theme"); btn.innerText="MODE CLAIR"; }
    };
    btn.onclick = () => {
        const t = document.documentElement.hasAttribute("data-theme") ? "dark" : "light";
        localStorage.setItem("theme", t); applyTheme(t);
    };
    applyTheme(localStorage.getItem("theme") || "dark");
    window.onload = load;
</script>
</body>
</html>
