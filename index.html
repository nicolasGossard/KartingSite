<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><title>Elite Racing | Next Gen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-wrapper"><nav><a href="index.html" class="active">Accueil</a><a href="team.html">Équipe</a><a href="leaderboard.html">Leaderboard</a></nav></div>
    
    <div class="theme-switch" id="theme-toggle">
        <div class="switch-dot"><span id="theme-icon">🌙</span></div>
    </div>

    <section class="hero-title-centered">
    <h1 class="reveal" style="font-size: clamp(60px, 12vw, 140px); font-weight: 800; letter-spacing: -4px; line-height: 0.9;">
        Elite Racing.
    </h1>
    <p class="reveal" style="font-size: 20px; color: var(--accent); font-weight: 700; letter-spacing: 6px; margin-top: 20px; text-transform: uppercase;">
        Dominez l'asphalte
    </p>
    <div class="reveal" style="margin-top: 50px; animation: bounce 2s infinite; font-size: 30px; opacity: 0.5;">
        ↓
    </div>
	</section>

	<section style="max-width: 900px; margin: 0 auto 100px; text-align: center; padding: 0 20px;">
		<h2 class="reveal" style="font-size: 48px; margin-bottom: 25px; font-weight: 800;">L'adrénaline pure.</h2>
		<p class="reveal" style="color: var(--text-dim); font-size: 21px; line-height: 1.6;">
			Vivez la simulation de course la plus intense sur le Web. 
			<span style="color: var(--text);">Pas de téléchargement</span>, juste de la vitesse brute.
		</p>
	</section>

	<div style="max-width: 1100px; margin: 0 auto 150px; padding: 0 20px;">
		<div class="reveal video-container">
			<iframe src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=0&mute=1&modestbranding=1&rel=0" allowfullscreen></iframe>
		</div>
	</div>

	<section style="text-align: center; padding-bottom: 150px;">
		<div class="reveal" style="background: var(--card); padding: 80px 40px; border-radius: 40px; border: 1px solid var(--border); max-width: 800px; margin: auto;">
			<h2 style="font-size: 40px; margin-bottom: 30px;">Prêt à entrer dans la légende ?</h2>
			<a href="leaderboard.html" class="cta-massive">REJOINDRE LA COURSE</a>
		</div>
	</section>
</body>
    <script>
        // REVEAL ANIMATION
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(r => observer.observe(r));

        // THEME TOGGLE LOGIC
        const toggle = document.getElementById('theme-toggle');
        const icon = document.getElementById('theme-icon');
        const applyTheme = (t) => {
            if(t === "light") { document.documentElement.setAttribute("data-theme", "light"); icon.innerText = "☀️"; }
            else { document.documentElement.removeAttribute("data-theme"); icon.innerText = "🌙"; }
        };
        toggle.onclick = () => {
            const t = document.documentElement.hasAttribute("data-theme") ? "dark" : "light";
            localStorage.setItem("theme", t); applyTheme(t);
        };
        applyTheme(localStorage.getItem("theme") || "dark");
    </script>
</body>
</html>
